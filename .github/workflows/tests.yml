name: Python Tests

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stablepayguard_test
          POSTGRES_USER: stablepayguard
          POSTGRES_PASSWORD: stablepayguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://stablepayguard:stablepayguard@localhost:5432/stablepayguard_test
          SECRET_KEY: ci-test-secret
          ADMIN_PASSWORD: testpass
          OPENAI_API_KEY: ""
          PRIVATE_KEY: ""
          POLICY_CONTRACT: ""
          RPC_URL: ""
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing
