version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: stablepayguard-db
    environment:
      POSTGRES_DB: stablepayguard
      POSTGRES_USER: stablepayguard
      POSTGRES_PASSWORD: stablepayguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablepayguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: stablepayguard
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://stablepayguard:stablepayguard@db:5432/stablepayguard
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
